appointment.booking_form:
  path: '/prendre-un-rendez-vous'
  defaults:
    _form: '\Drupal\appointment\Form\BookingForm'
    _title: 'Prendre un rendez-vous'
  requirements:
    _permission: 'access content'

appointment.manage_lookup:
  path: '/gerer-rendez-vous'
  defaults:
    _form: '\Drupal\appointment\Form\AppointmentLookupForm'
    _title: 'Gerer mon rendez-vous'
  requirements:
    _permission: 'access content'

appointment.manage_actions:
  path: '/gerer-rendez-vous/actions'
  defaults:
    _form: '\Drupal\appointment\Form\AppointmentManageActionsForm'
    _title: 'Mon rendez-vous'
  requirements:
    _permission: 'access content'

appointment.manage_modify:
  path: '/gerer-rendez-vous/modifier'
  defaults:
    _form: '\Drupal\appointment\Form\AppointmentModifyForm'
    _title: 'Modifier rendez-vous'
  requirements:
    _permission: 'access content'

appointment.manage_cancel:
  path: '/gerer-rendez-vous/supprimer'
  defaults:
    _form: '\Drupal\appointment\Form\AppointmentCancelForm'
    _title: 'Supprimer rendez-vous'
  requirements:
    _permission: 'access content'

entity.agency.settings:
  path: 'admin/structure/agency'
  defaults:
    _form: '\Drupal\appointment\Form\AgencySettingsForm'
    _title: 'Agency'
  requirements:
    _permission: 'administer agency'

entity.appointment.settings:
  path: 'admin/structure/appointment/settings'
  defaults:
    _form: '\Drupal\appointment\Form\AppointmentSettingsForm'
    _title: 'Appointment'
  requirements:
    _permission: 'administer appointment'
