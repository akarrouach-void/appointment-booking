services:
  appointment.management_helper:
    class: Drupal\appointment\Service\AppointmentManagementHelper
    arguments:
      - '@tempstore.private'
      - '@entity_type.manager'
      - '@datetime.time'
      - '@plugin.manager.mail'
      - '@language_manager'
      - '@messenger'

  appointment.wizard_helper:
    class: Drupal\appointment\Service\AppointmentWizardHelper
    arguments:
      - '@entity_type.manager'
      - '@appointment.management_helper'
